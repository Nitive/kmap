# Input devices to listen on.
devices:
  - /dev/input/by-path/platform-i8042-serio-0-event-kbd
  - /dev/input/by-id/usb-04d9_USB-HID_Keyboard-event-kbd

# Which layer keys should delay their keydown until the next key event.
suppress_keydown:
  - Caps
  - Alt

# Full mapping set.
mappings:
  # Alt layer (symbols)
  # Any Alt+key not listed here automatically passes through.
  Alt-9:
    to_symbol: «
  Alt-0:
    to_symbol: »
  Alt-Minus:
    to_symbol: “
  Alt-Equal:
    to_symbol: ”
  Alt-Q:
    to_symbol: "`"
  Alt-W:
    to_symbol: ","
  Alt-E:
    to_symbol: "."
  Alt-R:
    to_symbol: +
  Alt-P:
    to_symbol: —
  Alt-LeftBrace:
    to_symbol: /
  Alt-D:
    to_symbol: "="
  Alt-H:
    to_symbol: "-"
  Alt-I:
    to_symbol: ↑
  Alt-J:
    to_symbol: ←
  Alt-K:
    to_symbol: ↓
  Alt-L:
    to_symbol: →
  Alt-Z:
    to_symbol: ":"
  # Alt-Shift-Z:
  #   to_symbol: ";"
  Alt-X:
    to_symbol: "?"
  Alt-V:
    to_symbol: "~"
  Alt-B:
    to_symbol: ×
  Alt-N:
    to_symbol: "\\"
  Alt-M:
    to_symbol: −
  Alt-Dot:
    to_symbol: "|"
  Alt-Space:
    to_symbol: " "

  # Currency
  Alt-O:
    to_symbol: ₽
  Alt-G:
    to_symbol: $
  # Alt-Shift-D:
  #   to_symbol: €

  # German
  Alt-A:
    to_symbol: ä
  # Alt-Shift-A:
  #   to_symbol: Ä
  Alt-S:
    to_symbol: ö
  # Alt-Shift-O:
  #   to_symbol: Ö
  Alt-F:
    to_symbol: ü
  # Alt-Shift-F:
  #   to_symbol: Ü
  Alt-Semicolon:
    to_symbol: ß
  # Alt-Shift-Semicolon:
  #   to_symbol: ẞ

  # Caps layer (navigation + app shortcuts)
  Caps-W:
    to_chord: Ctrl-Shift-Comma
  Caps-R:
    to_chord: Meta-Ctrl-Alt-Shift-R
  Caps-I:
    to_keys: [Up]
  Caps-O:
    to_chord: Meta-Ctrl-Alt-Shift-O
  Caps-P:
    to_chord: Meta-Ctrl-Alt-Shift-P
  Caps-A:
    to_chord: Meta-Ctrl-Alt-Shift-A
  Caps-H:
    to_keys: [Backspace]
  Caps-J:
    to_keys: [Left]
  Caps-K:
    to_keys: [Down]
  Caps-L:
    to_keys: [Right]
  Caps-Semicolon:
    to_chord: Meta-Ctrl-Alt-Shift-Semicolon
  Caps-Apostrophe:
    to_chord: Meta-Ctrl-Alt-Shift-Apostrophe
  Caps-N:
    to_chord: Meta-Ctrl-Alt-Shift-N
  Caps-M:
    to_keys: [Esc]
  Caps-Comma:
    to_chord: Meta-Ctrl-Alt-Shift-Comma
  Caps-Dot:
    to_chord: Meta-Ctrl-Alt-Shift-Dot
