# Input devices to listen on.
devices:
  - /dev/input/by-path/platform-i8042-serio-0-event-kbd
  - /dev/input/by-id/usb-04d9_USB-HID_Keyboard-event-kbd

shortcut_layout:
  layout: us
  variant: dvorak

# Which layer keys should delay their keydown until the next key event.
suppress_keydown:
  - Caps
  - Alt

# Single-tap layout switches.
tap_layout_switches:
  LAlt:
    layout: us
    variant: dvorak
  RAlt:
    layout: ru

# Full mapping set.
mappings:
  # Alt layer (symbols)
  # Any Alt+key not listed here automatically passes through.
  Alt-9:
    to_symbol: «
  Alt-0:
    to_symbol: »
  Alt-LeftBrace:
    to_symbol: “
  Alt-RightBrace:
    to_symbol: ”
  Alt-Apostrophe:
    to_symbol: "`"
  Alt-Comma:
    to_symbol: ","
  Alt-Dot:
    to_symbol: "."
  Alt-P:
    to_symbol: +
  Alt-L:
    to_symbol: —
  Alt-Slash:
    to_symbol: /
  Alt-E:
    to_symbol: "="
  Alt-D:
    to_symbol: "-"
  Alt-C:
    to_symbol: ↑
  Alt-H:
    to_symbol: ←
  Alt-T:
    to_symbol: ↓
  Alt-N:
    to_symbol: →
  Alt-Semicolon:
    to_symbol: ":"
  # Alt-Shift-Semicolon:
  #   to_symbol: ";"
  Alt-Q:
    to_symbol: "?"
  Alt-K:
    to_symbol: "~"
  Alt-X:
    to_symbol: ×
  Alt-B:
    to_symbol: "\\"
  Alt-M:
    to_symbol: −
  Alt-V:
    to_symbol: "|"
  Alt-Space:
    to_symbol: " "

  # Currency
  Alt-R:
    to_symbol: ₽
  Alt-I:
    to_symbol: $
  # Alt-Shift-E:
  #   to_symbol: €

  # German
  Alt-A:
    to_symbol: ä
  # Alt-Shift-A:
  #   to_symbol: Ä
  Alt-O:
    to_symbol: ö
  # Alt-Shift-R:
  #   to_symbol: Ö
  Alt-U:
    to_symbol: ü
  # Alt-Shift-U:
  #   to_symbol: Ü
  Alt-S:
    to_symbol: ß
  # Alt-Shift-S:
  #   to_symbol: ẞ

  # Caps layer (navigation + app shortcuts)
  Caps-Comma:
    to_chord: Ctrl-Shift-W
  Caps-P:
    to_chord: Meta-Ctrl-Alt-Shift-P
  Caps-C:
    to_keys: [Up]
  Caps-R:
    to_chord: Meta-Ctrl-Alt-Shift-R
  Caps-L:
    to_chord: Meta-Ctrl-Alt-Shift-L
  Caps-A:
    to_chord: Meta-Ctrl-Alt-Shift-A
  Caps-D:
    to_keys: [Backspace]
  Caps-H:
    to_keys: [Left]
  Caps-T:
    to_keys: [Down]
  Caps-N:
    to_keys: [Right]
  Caps-S:
    to_chord: Meta-Ctrl-Alt-Shift-S
  Caps-Minus:
    to_chord: Meta-Ctrl-Alt-Shift-Minus
  Caps-B:
    to_chord: Meta-Ctrl-Alt-Shift-B
  Caps-M:
    to_keys: [Esc]
  Caps-W:
    to_chord: Meta-Ctrl-Alt-Shift-W
  Caps-V:
    to_chord: Meta-Ctrl-Alt-Shift-V
